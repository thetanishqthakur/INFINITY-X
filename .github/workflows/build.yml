name: Build Infinity X Android 16 - Peridot (POCO F6)

on:
  workflow_dispatch:
    inputs:
      BUILD_TYPE:
        description: 'Build Type'
        required: true
        default: 'userdebug'
        type: choice
        options:
          - userdebug
          - user
          - eng

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 360

    steps:
    - name: Maximize Build Space
      uses: easimon/maximize-build-space@master
      with:
        root-reserve-mb: 512
        swap-size-mb: 10240
        remove-dotnet: 'true'
        remove-android: 'true'
        remove-haskell: 'true'
        remove-codeql: 'true'

    - name: Setup Build Environment
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git-core gnupg flex bison build-essential \
          zip curl zlib1g-dev libc6-dev-i386 \
          libncurses5 x11proto-core-dev libx11-dev \
          lib32z1-dev libgl1-mesa-dev libxml2-utils \
          xsltproc unzip python3 python-is-python3 \
          openjdk-21-jdk bc ccache lzop libssl-dev \
          libelf-dev libtinfo5

    - name: Setup Repo Tool
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        echo "$HOME/bin" >> $GITHUB_PATH

    - name: Git Config
      run: |
        git config --global user.email "hunter@build.com"
        git config --global user.name "HunteR"

    - name: Sync Infinity X Source
      run: |
        mkdir -p ~/android/infinity
        cd ~/android/infinity
        repo init --depth=1 --no-repo-verify --git-lfs \
          -u https://github.com/ProjectInfinity-X/manifest \
          -b 16 \
          -g default,-mips,-darwin,-notdefault
        repo sync -c --no-clone-bundle --no-tags \
          --optimized-fetch --prune --force-sync \
          -j$(nproc --all)

    - name: Clone Device Trees
      run: |
        cd ~/android/infinity
        git clone https://github.com/thetanishqthakur/android_device_xiaomi_peridot \
          device/xiaomi/peridot -b lineage-23.2 --depth=1
        git clone https://github.com/crdroidandroid/proprietary_vendor_xiaomi_peridot \
          vendor/xiaomi/peridot --depth=1
        git clone https://github.com/crdroidandroid/android_hardware_xiaomi_peridot \
          hardware/xiaomi --depth=1
        git clone https://github.com/peridot-dev/android_kernel_xiaomi_sm8635 \
          kernel/xiaomi/sm8635 --depth=1
        git clone https://github.com/peridot-dev/android_kernel_xiaomi_sm8635-modules \
          kernel/xiaomi/sm8635-modules --depth=1
        git clone https://github.com/peridot-dev/android_kernel_xiaomi_sm8635-devicetrees \
          kernel/xiaomi/sm8635-devicetrees --depth=1

    - name: Build ROM
      run: |
        cd ~/android/infinity
        source build/envsetup.sh
        lunch infinity_peridot-${{ github.event.inputs.BUILD_TYPE }}
        m bacon -j$(nproc --all)

    - name: Upload ROM to Releases
      uses: softprops/action-gh-release@v2
      with:
        tag_name: infinity-x-a16-peridot-${{ github.run_number }}
        name: "Infinity X Android 16 - Peridot | By HunteR"
        body: |
          Maintainer: HunteR
          Build Type: UNOFFICIAL
          Android: 16
        files: |
          ~/android/infinity/out/target/product/peridot/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
